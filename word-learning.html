<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="format-detection" content="telephone=no">
<title>小学英语单词乐园 · 时间 · 交通 · 天气</title>
<style>
  :root{
    --bg:#fef9f3;
    --card:#ffffff;
    --ink:#2d2a4a;
    --muted:#7b7898;
    --line:#efe7f7;
    --time:#7c6cff;
    --time-soft:#efeaff;
    --trans:#22b8a6;
    --trans-soft:#e2f7f4;
    --weather:#ff9a3d;
    --weather-soft:#fff0e2;
    --shadow:0 10px 30px rgba(90,70,160,.10);
    --radius:20px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%;text-size-adjust:100%}
  body{
    font-family:"PingFang SC","Microsoft YaHei","Comic Sans MS",-apple-system,system-ui,sans-serif;
    background:
      radial-gradient(1200px 400px at 10% -10%,#fff3e0 0%,transparent 60%),
      radial-gradient(1000px 400px at 100% 0%,#eae6ff 0%,transparent 55%),
      var(--bg);
    color:var(--ink);
    min-height:100vh;
    padding:calc(24px + env(safe-area-inset-top)) calc(16px + env(safe-area-inset-right)) 60px calc(16px + env(safe-area-inset-left));
    -webkit-tap-highlight-color:transparent;
    -webkit-font-smoothing:antialiased;
  }
  button{-webkit-tap-highlight-color:transparent;touch-action:manipulation}
  .wrap{max-width:1120px;margin:0 auto}

  header.hero{text-align:center;padding:26px 20px 8px}
  .hero h1{font-size:34px;letter-spacing:1px;margin-bottom:8px}
  .hero h1 .em{color:var(--time)}
  .hero p{color:var(--muted);font-size:15px}
  .hero .badges{margin-top:14px;display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
  .badge{font-size:13px;padding:5px 12px;border-radius:999px;background:#fff;box-shadow:var(--shadow);color:var(--muted)}

  .tabs{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin:22px 0 6px}
  .tab{
    cursor:pointer;border:none;font:inherit;font-weight:700;padding:14px 26px;border-radius:999px;
    background:#fff;color:var(--muted);box-shadow:var(--shadow);transition:.2s;display:flex;align-items:center;gap:8px;font-size:16px;min-height:48px;
  }
  .tab .ico{font-size:20px}
  @media(hover:hover){ .tab:hover{transform:translateY(-2px)} }
  .tab.active[data-cat="time"]{background:var(--time);color:#fff}
  .tab.active[data-cat="trans"]{background:var(--trans);color:#fff}
  .tab.active[data-cat="weather"]{background:var(--weather);color:#fff}

  .cat-desc{text-align:center;color:var(--muted);font-size:14px;margin:14px 0 4px;min-height:20px}
  .count{text-align:center;color:var(--muted);font-size:13px;margin-bottom:6px}

  .sub-title{
    grid-column:1/-1;font-size:16px;font-weight:800;margin:14px 2px 2px;display:flex;align-items:center;gap:8px;
  }
  .sub-title span.dot{width:10px;height:10px;border-radius:50%;display:inline-block}
  .grid[data-c="time"] .sub-title span.dot{background:var(--time)}
  .grid[data-c="trans"] .sub-title span.dot{background:var(--trans)}
  .grid[data-c="weather"] .sub-title span.dot{background:var(--weather)}

  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:18px;margin-top:18px}
  .card{
    background:var(--card);border-radius:var(--radius);padding:18px 18px 16px;box-shadow:var(--shadow);
    border:2px solid transparent;transition:.2s;position:relative;overflow:hidden;
  }
  .card:hover{transform:translateY(-4px)}
  @media(hover:none){ .card:active{transform:scale(.99)} }
  .card::before{content:"";position:absolute;left:0;top:0;width:100%;height:6px}
  .card[data-c="time"]::before{background:var(--time)}
  .card[data-c="trans"]::before{background:var(--trans)}
  .card[data-c="weather"]::before{background:var(--weather)}

  .card-top{display:flex;align-items:center;gap:12px;margin-bottom:6px}
  .emoji{width:56px;height:56px;border-radius:16px;display:grid;place-items:center;font-size:30px;flex-shrink:0}
  .card[data-c="time"] .emoji{background:var(--time-soft)}
  .card[data-c="trans"] .emoji{background:var(--trans-soft)}
  .card[data-c="weather"] .emoji{background:var(--weather-soft)}

  .word-en{font-size:24px;font-weight:800;line-height:1.1}
  .word-cn{font-size:14px;color:var(--muted);margin-top:2px}

  .phon{display:flex;align-items:center;gap:10px;margin:10px 0 12px;flex-wrap:wrap}
  .ipa{font-family:"Times New Roman",serif;font-size:16px;color:var(--time);background:var(--time-soft);padding:3px 10px;border-radius:8px}
  .card[data-c="trans"] .ipa{color:var(--trans);background:var(--trans-soft)}
  .card[data-c="weather"] .ipa{color:var(--weather);background:var(--weather-soft)}
  .play{
    cursor:pointer;border:none;font:inherit;font-weight:700;font-size:14px;padding:9px 18px;border-radius:999px;
    color:#fff;display:inline-flex;align-items:center;gap:6px;transition:.15s;min-height:40px;
  }
  .card[data-c="time"] .play{background:var(--time)}
  .card[data-c="trans"] .play{background:var(--trans)}
  .card[data-c="weather"] .play{background:var(--weather)}
  .play:active{transform:scale(.94)}

  .block{border-top:1px dashed var(--line);padding-top:10px;margin-top:6px}
  .block .lbl{font-size:12px;color:var(--muted);font-weight:700;margin-bottom:4px;display:flex;align-items:center;gap:5px}
  .sentence{font-size:14.5px;line-height:1.5}
  .sentence .cn{color:var(--muted);font-size:13px;display:block;margin-top:2px}
  .scene{font-size:13px;color:var(--ink);background:#faf8ff;border-radius:10px;padding:8px 10px;line-height:1.5}
  .mini-play{cursor:pointer;border:none;background:transparent;font-size:20px;vertical-align:middle;margin-left:4px;opacity:.75;padding:4px 6px;min-width:36px;min-height:36px}
  @media(hover:hover){ .mini-play:hover{opacity:1} }

  footer{text-align:center;color:var(--muted);font-size:13px;margin-top:40px;line-height:1.7}
  .tip{background:#fff;border-radius:14px;padding:12px 16px;box-shadow:var(--shadow);display:inline-block;margin-top:10px;font-size:13px;color:var(--muted)}

  /* iPad 横屏 / 大屏：三列，卡片更大更好点 */
  @media(min-width:834px){
    .wrap{max-width:1200px}
    .grid{grid-template-columns:repeat(3,1fr);gap:20px}
    .word-en{font-size:25px}
    .sentence{font-size:15.5px}
    .scene{font-size:14px}
  }
  /* iPad 竖屏：两列 */
  @media(min-width:600px) and (max-width:833px){
    .grid{grid-template-columns:repeat(2,1fr);gap:18px}
    .word-en{font-size:24px}
    .sentence{font-size:15px}
  }
  @media(max-width:599px){
    .hero h1{font-size:26px}
    .grid{grid-template-columns:1fr}
    .word-en{font-size:22px}
  }
</style>
</head>
<body>
<div class="wrap">
  <header class="hero">
    <h1>🌈 小学英语<span class="em">单词乐园</span></h1>
    <p>时间 · 交通方式 · 天气 —— 点击喇叭听读音，跟着例句大声读！</p>
    <div class="badges">
      <span class="badge">🔊 真人发音</span>
      <span class="badge">🔤 国际音标</span>
      <span class="badge">📝 例句 + 场景</span>
      <span class="badge">📚 90+ 个单词</span>
    </div>
  </header>

  <nav class="tabs">
    <button class="tab active" data-cat="time"><span class="ico">⏰</span>时间</button>
    <button class="tab" data-cat="trans"><span class="ico">🚌</span>交通方式</button>
    <button class="tab" data-cat="weather"><span class="ico">☀️</span>天气</button>
  </nav>
  <div class="cat-desc" id="catDesc"></div>
  <div class="count" id="count"></div>

  <main class="grid" id="grid" data-c="time"></main>

  <footer>
    <div class="tip">💡 学习小贴士：每天学 5-8 个单词，先听读音，再跟读例句，最后想一想什么时候会用到它～</div>
    <p style="margin-top:16px">🌟 小学英语单词乐园 · 时间 / 交通 / 天气专题 🌟</p>
  </footer>
</div>

let voice = null;
function pickVoice(){
  const vs = speechSynthesis.getVoices();
  voice = vs.find(v=>/en-GB/i.test(v.lang)) ||
          vs.find(v=>/en[-_]/i.test(v.lang)) ||
          vs.find(v=>/^en/i.test(v.lang)) ||
          vs.find(v=>/English/i.test(v.name)) || null;
}
if('speechSynthesis' in window){ pickVoice(); speechSynthesis.onvoiceschanged = pickVoice; }

/* iOS/iPad Safari 需要在首次用户手势里“解锁”语音 */
let speechUnlocked = false;
function unlockSpeech(){
  if(speechUnlocked || !('speechSynthesis' in window)) return;
  try{
    const u = new SpeechSynthesisUtterance('');
    u.volume = 0;
    speechSynthesis.speak(u);
    speechUnlocked = true;
  }catch(e){}
}
document.addEventListener('touchstart', unlockSpeech, {once:true, passive:true});
document.addEventListener('click', unlockSpeech, {once:true});

function speak(text, rate){
  if(!('speechSynthesis' in window)){ alert('当前浏览器不支持朗读功能，请更新到较新版本的 Safari 或 Chrome。'); return; }
  unlockSpeech();
  speechSynthesis.cancel();               // 打断上一个，避免 iOS 卡住
  if(!voice) pickVoice();                  // 兜底再取一次
  const u = new SpeechSynthesisUtterance(text);
  u.lang = (voice && voice.lang) || 'en-US';
  u.rate = rate || .85;
  u.pitch = 1;
  if(voice) u.voice = voice;
  // iOS 有时首个请求被吞，稍作延迟更稳
  setTimeout(()=>{ try{ speechSynthesis.speak(u); }catch(e){} }, 0);
}

const grid = document.getElementById('grid');
const catDesc = document.getElementById('catDesc');
const countEl = document.getElementById('count');

function cardHTML(cat,w){
  return `
    <div class="card" data-c="${cat}">
      <div class="card-top">
        <div class="emoji">${w.emoji}</div>
        <div>
          <div class="word-en">${w.en}</div>
          <div class="word-cn">${w.cn}</div>
        </div>
      </div>
      <div class="phon">
        <span class="ipa">${w.ipa}</span>
        <button class="play" onclick="speak('${w.en.replace(/ʼ/g,"")}',0.8)">🔊 读单词</button>
      </div>
      <div class="block">
        <div class="lbl">📝 例句
          <button class="mini-play" title="朗读例句" onclick="speak('${w.s.replace(/'/g,"").replace(/ʼ/g,"")}',0.82)">🔊</button>
        </div>
        <div class="sentence">${w.s}<span class="cn">${w.scn}</span></div>
      </div>
      <div class="block">
        <div class="lbl">🎯 使用场景</div>
        <div class="scene">${w.sc}</div>
      </div>
    </div>`;
}

function render(cat){
  const d = DATA[cat];
  grid.setAttribute('data-c',cat);
  catDesc.textContent = d.desc;
  let total = 0, html = '';
  d.groups.forEach(g=>{
    html += `<div class="sub-title"><span class="dot"></span>${g.title}</div>`;
    g.words.forEach(w=>{ html += cardHTML(cat,w); total++; });
  });
  grid.innerHTML = html;
  countEl.textContent = `本主题共 ${total} 个单词`;
}

document.querySelectorAll('.tab').forEach(t=>{
  t.addEventListener('click',()=>{
    document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
    t.classList.add('active');
    render(t.dataset.cat);
    window.scrollTo({top:0,behavior:'smooth'});
  });
});

render('time');
